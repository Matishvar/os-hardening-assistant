{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OS Hardening Assistant - Sign In</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      padding: 1.5rem;
      position: relative;
    }
    
    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 3rem;
      border-radius: var(--radius-lg);
      text-align: center;
      animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes cardSlideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .login-header {
      margin-bottom: 2rem;
    }
    
    .login-badge {
      width: 56px;
      height: 56px;
      background: var(--primary-glow);
      color: var(--primary);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      border: 1px solid var(--panel-border);
      margin-bottom: 1rem;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
    }
    
    .login-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #818cf8 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .login-header p {
      color: var(--text-secondary);
      font-size: 0.88rem;
      margin-top: 0.25rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--panel-border);
      padding: 0.85rem 1rem 0.85rem 2.5rem;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all var(--transition-fast);
    }
    
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    
    .input-wrapper svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    
    .error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-align: left;
      animation: shake 0.4s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .submit-btn {
      width: 100%;
      background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
      color: white;
      border: none;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--radius-sm);
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
      transition: all var(--transition-fast);
      margin-top: 0.5rem;
    }
    
    .submit-btn:hover {
      background: linear-gradient(90deg, #4f46e5 0%, #9333ea 100%);
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
      transform: translateY(-1px);
    }
    
    .default-creds {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: left;
    }
    
    .default-creds h4 {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.75rem;
    }
    
    .default-creds code {
      font-family: var(--font-mono);
      background: rgba(0,0,0,0.3);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      color: #818cf8;
      border: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <!-- Ambient background glow elements -->
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <div class="login-container">
    <div class="login-card glass-panel">
      <div class="login-header">
        <div class="login-badge">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2>Sign In</h2>
        <p>Access OS Hardening Dashboard</p>
      </div>

      {% if error %}
      <div class="error-alert">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="username" name="username" placeholder="Enter username..." required autofocus autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter password..." required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="submit-btn">Authorize Session</button>
      </form>

      <div style="margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-secondary);">
        Don't have an account? <a href="{% url 'register' %}" style="color: #818cf8; text-decoration: none; font-weight: 600;">Create Account</a>
      </div>

      <div class="default-creds">
        <h4>🔒 Administrator Credentials</h4>
        Username: <code>Matish</code><br>
        Password: <code>Matish-admin-2008</code>
      </div>
    </div>
  </div>
</body>
</html>
