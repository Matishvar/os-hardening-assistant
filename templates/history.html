{% extends 'base.html' %}
{% load static %}

{% block content %}
<header class="glass-panel" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; flex-wrap: wrap; gap: 1.5rem;">
  <div class="logo-section">
    <h2 style="font-size: 1.75rem; font-weight: 700; background: linear-gradient(90deg, #818cf8 0%, #34d399 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem;">
      📜 Diagnostic Scan Logs
    </h2>
    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Historical timeline of system compliance diagnostics and downloadable PDF reports</p>
  </div>
</header>

<div class="glass-panel" style="padding: 2rem; overflow-x: auto;">
  <table class="history-table" style="width: 100%; border-collapse: collapse; min-width: 600px;">
    <thead>
      <tr style="border-bottom: 2px solid var(--panel-border); text-align: left;">
        <th style="padding: 1rem 1.5rem; color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Date & Time</th>
        <th style="padding: 1rem 1.5rem; color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Target Operating System</th>
        <th style="padding: 1rem 1.5rem; color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Compliance Score</th>
        <th style="padding: 1rem 1.5rem; color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; text-align: right;">Actions</th>
      </tr>
    </thead>
    <tbody id="history-logs-tbody">
      <!-- Populated dynamically via localStorage in app.js to persist scans across Vercel stateless lifecycles -->
    </tbody>
  </table>
</div>

<!-- Dummy JSON config so app.js does not crash on history view load -->
<div style="display:none;">
  <span id="progress-value">0%</span>
  <span id="completed-value">0</span>
  <span id="pending-value">0</span>
  <button id="scan-btn"></button>
  <div id="loading-overlay"></div>
  <div id="report-modal">
    <span id="report-platform-title"></span>
    <span id="report-timestamp"></span>
    <span id="report-before-score"></span>
    <span id="report-after-score"></span>
    <a href="#" id="download-pdf-btn"></a>
    <div id="score-shift-bar"></div>
    <span id="shift-summary"></span>
    <ul id="report-resolved-list"></ul>
    <ul id="report-failed-list"></ul>
    <button id="close-modal-btn"></button>
  </div>
  <span id="file-name"></span>
  <textarea id="code-viewer"></textarea>
  <button id="copy-btn"></button>
  <button id="download-btn"></button>
  <input type="text" id="search-input">
  <div id="filter-group"></div>
  <div id="checklist"></div>
  <button id="toggle-all-checkboxes"></button>
  <button id="toggle-all-script"></button>
</div>

<script id="django-rules-data" type="application/json">
  {
    "windows": [],
    "linux": []
  }
</script>
{% endblock %}
